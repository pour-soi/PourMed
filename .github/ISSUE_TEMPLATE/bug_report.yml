name: Bug report
description: Report a reproducible problem in PourMed
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve PourMed.

        **Do not paste access tokens, private keys, medication history, push endpoints, Cloudflare credentials, Account IDs, database exports, or personal deployment URLs. Use synthetic and redacted information only.**
  - type: input
    id: version
    attributes:
      label: PourMed version or commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true
  - type: input
    id: browser_os
    attributes:
      label: Browser and operating-system version
      description: Include the iOS/iPadOS version when applicable.
      placeholder: Safari on iOS 18.x
    validations:
      required: true
  - type: dropdown
    id: launch_mode
    attributes:
      label: Launch mode
      options:
        - Installed Home Screen PWA
        - Safari browser tab
        - Another browser or platform
    validations:
      required: true
  - type: input
    id: service_worker
    attributes:
      label: Service-worker version and state
      description: Copy only the safe version and registration state from diagnostics.
      placeholder: v8, registered
    validations:
      required: true
  - type: dropdown
    id: notification_permission
    attributes:
      label: Notification permission
      options:
        - granted
        - denied
        - default
        - unavailable
        - not relevant
    validations:
      required: true
  - type: dropdown
    id: subscription
    attributes:
      label: Push-subscription status
      options:
        - active
        - inactive or missing
        - unavailable
        - unknown
        - not relevant
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use a clean self-hosted or local instance with synthetic data.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional redacted context
      description: Do not attach private logs, screenshots, exports, tokens, or medication records.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed all secrets, personal data, medication history, private URLs, and Cloudflare identifiers.
          required: true
